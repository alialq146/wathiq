<!doctype html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style> body{margin:0;padding:22px;background:var(--bg-app);} .row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;} .stack{display:flex;gap:18px;align-items:center;flex-wrap:wrap;} </style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, Switch } = window.WathiqDesignSystem_f0eeb8;
function Demo(){
  const [c1,setC1]=React.useState(true);
  return (<div>
    <div className="row">
      <Input label="عنوان المتطلب" placeholder="مثال: تسجيل الدخول بالنفاذ الوطني" />
      <Select label="الأولوية" options={["حرجة","عالية","متوسطة","منخفضة"]} defaultValue="عالية" />
    </div>
    <div className="row">
      <Input label="البريد الإلكتروني" error="بريد غير صالح" defaultValue="sara@" />
      <Input label="بحث في المتطلبات" placeholder="ابحث برقم أو نص…" />
    </div>
    <div className="stack">
      <Checkbox label="يدعم الهوية الوطنية" checked={c1} onChange={e=>setC1(e.target.checked)} />
      <Checkbox label="بحاجة لمراجعة قانونية" />
      <Switch label="تحليل تلقائي عند الرفع" defaultChecked />
      <Switch label="إشعارات" />
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
