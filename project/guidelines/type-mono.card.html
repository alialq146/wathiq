<!-- @dsCard group="Type" viewport="700x150" name="Mono — IDs & metadata" subtitle="IBM Plex Mono for Requirement IDs and codes" -->
<!doctype html>
<html dir="rtl" lang="ar">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--surface-card); color:var(--text-body); }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
  .chip { font:var(--font-mono-id); color:var(--navy-700); background:var(--slate-100); border:1px solid var(--border-default); padding:5px 9px; border-radius:var(--radius-sm); direction:ltr; }
  .chip.b { background:var(--blue-50); color:var(--blue-700); border-color:var(--blue-100); }
  .chip.t { background:var(--teal-50); color:var(--teal-700); border-color:var(--teal-100); }
  .note { font:var(--font-body); color:var(--text-muted); margin-top:14px; }
</style></head>
<body>
  <div class="row">
    <span class="chip b">FR-001</span>
    <span class="chip b">FR-014</span>
    <span class="chip">NFR-003</span>
    <span class="chip">BR-22</span>
    <span class="chip t">AC-1.4</span>
    <span class="chip">v2.3.0</span>
    <span class="chip">#PRJ-4821</span>
  </div>
  <div class="note">Mono keeps identifiers LTR and vertically aligned inside Arabic copy.</div>
</body></html>
