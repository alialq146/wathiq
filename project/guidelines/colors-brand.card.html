<!-- @dsCard group="Colors" viewport="700x180" name="Brand" subtitle="Navy ink + teal intelligence accent" -->
<!doctype html>
<html dir="rtl" lang="ar">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface-card); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; border-radius:var(--radius-lg); padding:14px; height:108px; display:flex; flex-direction:column; justify-content:space-between; box-shadow:var(--shadow-xs); }
  .sw .nm { font:var(--font-label); }
  .sw .hx { font:var(--font-mono-id); opacity:.85; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--navy-800);color:#fff;"><span class="nm">Navy 800 · Brand</span><span class="hx">#001851</span></div>
    <div class="sw" style="background:var(--navy-950);color:#fff;"><span class="nm">Navy 950 · Ink</span><span class="hx">#04142E</span></div>
    <div class="sw" style="background:var(--teal-500);color:#fff;"><span class="nm">Teal 500 · Accent</span><span class="hx">#159891</span></div>
    <div class="sw" style="background:var(--blue-600);color:#fff;"><span class="nm">Blue 600 · Primary</span><span class="hx">#2B57E0</span></div>
  </div>
</body></html>
