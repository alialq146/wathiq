<!doctype html>
<html dir="rtl" lang="ar">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px; background:var(--surface-card); display:flex; gap:24px; align-items:stretch; }
  .panel { border:1px solid var(--border-default); border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; padding:16px; }
  .lockup { flex:2; background:#fff; }
  .lockup img { height:96px; }
  .mark { flex:1; background:var(--slate-50); }
  .mark img { height:108px; }
  .cap { position:absolute; }
</style></head>
<body>
  <div class="panel lockup"><img src="../assets/wathiq-logo.png" alt="Wathiq logo"></div>
  <div class="panel mark"><img src="../assets/wathiq-mark.png" alt="Wathiq mark"></div>
