<!-- @dsCard group="Type" viewport="700x200" name="Headings" subtitle="IBM Plex Sans Arabic — display & headings" -->
<!doctype html>
<html dir="rtl" lang="ar">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--surface-card); color:var(--text-strong); }
  .stack > * + * { margin-top:10px; }
  .meta { font:var(--font-mono-id); color:var(--text-subtle); margin-inline-start:10px; }
  .d { font:var(--font-display); letter-spacing:var(--tracking-tight); }
  .h1 { font:var(--font-h1); }
  .h2 { font:var(--font-h2); }
  .h3 { font:var(--font-h3); }
</style></head>
<body>
  <div class="stack">
    <div class="d">تحليل المتطلبات<span class="meta">40 · Bold</span></div>
    <div class="h1">المتطلبات الوظيفية<span class="meta">30 · Semibold</span></div>
    <div class="h2">معايير القبول والقواعد<span class="meta">24 · Semibold</span></div>
    <div class="h3">أصحاب المصلحة<span class="meta">20 · Semibold</span></div>
  </div>
</body></html>
