<!-- @dsCard group="Colors" viewport="700x130" name="Primary Blue scale" subtitle="Trust-blue — interactive, links, focus" -->
<!doctype html>
<html dir="rtl" lang="ar">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface-card); }
  .scale { display:flex; gap:6px; }
  .c { flex:1; height:72px; border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:6px; box-shadow:var(--shadow-xs); }
  .c span { font:var(--weight-medium) 10px/1 var(--font-mono); }
</style></head>
<body>
  <div class="scale">
    <div class="c" style="background:var(--blue-50)"><span style="color:var(--blue-700)">50</span></div>
    <div class="c" style="background:var(--blue-100)"><span style="color:var(--blue-700)">100</span></div>
    <div class="c" style="background:var(--blue-200)"><span style="color:var(--blue-800)">200</span></div>
    <div class="c" style="background:var(--blue-300)"><span style="color:var(--blue-900)">300</span></div>
    <div class="c" style="background:var(--blue-400)"><span style="color:#fff">400</span></div>
    <div class="c" style="background:var(--blue-500)"><span style="color:#fff">500</span></div>
    <div class="c" style="background:var(--blue-600)"><span style="color:#fff">600</span></div>
    <div class="c" style="background:var(--blue-700)"><span style="color:#fff">700</span></div>
    <div class="c" style="background:var(--blue-800)"><span style="color:#fff">800</span></div>
    <div class="c" style="background:var(--blue-900)"><span style="color:#fff">900</span></div>
  </div>
</body></html>
