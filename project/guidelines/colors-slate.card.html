<!-- @dsCard group="Colors" viewport="700x130" name="Neutral slate scale" subtitle="Cool-slate neutrals — text, surfaces, borders" -->
<!doctype html>
<html dir="rtl" lang="ar">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface-card); }
  .scale { display:flex; gap:6px; }
  .c { flex:1; height:72px; border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:6px; box-shadow:var(--shadow-xs); border:1px solid var(--border-subtle); }
  .c span { font:var(--weight-medium) 10px/1 var(--font-mono); }
</style></head>
<body>
  <div class="scale">
    <div class="c" style="background:var(--slate-0)"><span style="color:var(--slate-500)">0</span></div>
    <div class="c" style="background:var(--slate-50)"><span style="color:var(--slate-500)">50</span></div>
    <div class="c" style="background:var(--slate-100)"><span style="color:var(--slate-500)">100</span></div>
    <div class="c" style="background:var(--slate-200)"><span style="color:var(--slate-600)">200</span></div>
    <div class="c" style="background:var(--slate-300)"><span style="color:var(--slate-700)">300</span></div>
    <div class="c" style="background:var(--slate-400)"><span style="color:#fff">400</span></div>
    <div class="c" style="background:var(--slate-500)"><span style="color:#fff">500</span></div>
    <div class="c" style="background:var(--slate-600)"><span style="color:#fff">600</span></div>
    <div class="c" style="background:var(--slate-700)"><span style="color:#fff">700</span></div>
    <div class="c" style="background:var(--slate-800)"><span style="color:#fff">800</span></div>
    <div class="c" style="background:var(--slate-900)"><span style="color:#fff">900</span></div>
  </div>
</body></html>
