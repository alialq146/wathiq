<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base unit" -->
<!doctype html>
<html dir="rtl" lang="ar">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--surface-card); }
  .row { display:flex; gap:16px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background:var(--blue-200); border-radius:var(--radius-xs); }
  .lab { font:var(--font-mono-id); color:var(--text-muted); font-size:11px; }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:4px;height:4px"></div><span class="lab">1·4</span></div>
    <div class="item"><div class="box" style="width:8px;height:8px"></div><span class="lab">2·8</span></div>
    <div class="item"><div class="box" style="width:12px;height:12px"></div><span class="lab">3·12</span></div>
    <div class="item"><div class="box" style="width:16px;height:16px"></div><span class="lab">4·16</span></div>
    <div class="item"><div class="box" style="width:24px;height:24px"></div><span class="lab">6·24</span></div>
    <div class="item"><div class="box" style="width:32px;height:32px"></div><span class="lab">7·32</span></div>
    <div class="item"><div class="box" style="width:48px;height:48px"></div><span class="lab">9·48</span></div>
    <div class="item"><div class="box" style="width:64px;height:64px"></div><span class="lab">10·64</span></div>
  </div>
</body></html>
