<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="12px is the signature card radius" -->
<!doctype html>
<html dir="rtl" lang="ar">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--surface-card); }
  .row { display:flex; gap:18px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width:72px; height:56px; background:var(--slate-100); border:1.5px solid var(--blue-300); }
  .lab { font:var(--font-mono-id); color:var(--text-muted); font-size:11px; }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">sm·6</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">md·8</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg);border-color:var(--teal-500)"></div><span class="lab">lg·12 ★</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lab">xl·16</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="lab">2xl·20</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:96px"></div><span class="lab">pill</span></div>
  </div>
</body></html>
