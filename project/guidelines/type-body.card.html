<!-- @dsCard group="Type" viewport="700x210" name="Body & UI text" subtitle="Reading sizes and UI labels" -->
<!doctype html>
<html dir="rtl" lang="ar">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--surface-card); color:var(--text-body); }
  .stack > * + * { margin-top:12px; }
  .meta { font:var(--font-mono-id); color:var(--text-subtle); margin-inline-start:10px; }
  .lg { font:var(--weight-regular) var(--text-lg)/var(--leading-relaxed) var(--font-sans); color:var(--text-strong); }
  .base { font:var(--font-body); }
  .sm { font:var(--weight-regular) var(--text-sm)/var(--leading-normal) var(--font-sans); color:var(--text-muted); }
  .eyebrow { font:var(--weight-semibold) var(--text-2xs)/1 var(--font-sans); letter-spacing:var(--tracking-wide); text-transform:uppercase; color:var(--text-subtle); }
</style></head>
<body>
  <div class="stack">
    <div class="eyebrow">نطاق المشروع · Scope<span class="meta">11 · Semibold · uppercase</span></div>
    <div class="lg">يحلّل وثّق وثائق المتطلبات ويستخرج المعايير القابلة للتنفيذ.<span class="meta">16 · Lead</span></div>
    <div class="base">يجب أن يتمكّن المحلل من مراجعة كل متطلب، وتعديل معايير القبول، واعتماده قبل التسليم للفريق الهندسي.<span class="meta">14 · Body</span></div>
    <div class="sm">آخر تحديث قبل ٣ ساعات بواسطة سارة العتيبي<span class="meta">13 · Secondary</span></div>
  </div>
</body></html>
