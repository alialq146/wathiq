<!-- @dsCard group="Colors" viewport="700x130" name="Teal scale" subtitle="Intelligence / AI accent" -->
<!doctype html>
<html dir="rtl" lang="ar">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface-card); }
  .scale { display:flex; gap:6px; }
  .c { flex:1; height:72px; border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:6px; box-shadow:var(--shadow-xs); }
  .c span { font:var(--weight-medium) 10px/1 var(--font-mono); }
</style></head>
<body>
  <div class="scale">
    <div class="c" style="background:var(--teal-50)"><span style="color:var(--teal-700)">50</span></div>
    <div class="c" style="background:var(--teal-100)"><span style="color:var(--teal-700)">100</span></div>
    <div class="c" style="background:var(--teal-200)"><span style="color:var(--teal-700)">200</span></div>
    <div class="c" style="background:var(--teal-300)"><span style="color:var(--teal-700)">300</span></div>
    <div class="c" style="background:var(--teal-400)"><span style="color:#fff">400</span></div>
    <div class="c" style="background:var(--teal-500)"><span style="color:#fff">500</span></div>
    <div class="c" style="background:var(--teal-600)"><span style="color:#fff">600</span></div>
    <div class="c" style="background:var(--teal-700)"><span style="color:#fff">700</span></div>
  </div>
</body></html>
